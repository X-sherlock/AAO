dataset:
  id: real_us_multi_asset_v1
  version: v1
  raw_root: data/raw
  raw_path: data/raw/real_us_multi_asset_v1
  processed_path: data/processed/real_us_multi_asset_v1

provider:
  name: yfinance
  parameters:
    currency: USD
    timeout: 30

date_range:
  start: "2008-01-01"
  end:

assets:
  - {asset_code: SPY, asset_name: SPDR S&P 500 ETF Trust, asset_class: US large-cap equity}
  - {asset_code: IWM, asset_name: iShares Russell 2000 ETF, asset_class: US small-cap equity}
  - {asset_code: IEF, asset_name: iShares 7-10 Year Treasury Bond ETF, asset_class: intermediate Treasury}
  - {asset_code: TLT, asset_name: iShares 20+ Year Treasury Bond ETF, asset_class: long Treasury}
  - {asset_code: LQD, asset_name: iShares iBoxx Investment Grade Corporate Bond ETF, asset_class: investment-grade credit}
  - {asset_code: HYG, asset_name: iShares iBoxx High Yield Corporate Bond ETF, asset_class: high-yield credit}
  - {asset_code: GLD, asset_name: SPDR Gold Shares, asset_class: gold}
  - {asset_code: DBC, asset_name: Invesco DB Commodity Index Tracking Fund, asset_class: broad commodities}
  - {asset_code: VNQ, asset_name: Vanguard Real Estate ETF, asset_class: US real estate}
  - {asset_code: BIL, asset_name: SPDR Bloomberg 1-3 Month T-Bill ETF, asset_class: cash proxy}

validation:
  extreme_return_threshold: 0.35
  extreme_return_action: flag
  max_consecutive_missing: 5

features:
  windows: [20, 60, 120]
  ewma_decay: 0.94

rebalance:
  frequency: weekly
  decision_day: last_valid_trading_day

splits:
  - mode: fixed
    split_id: fixed_v1
    train_start: "2008-06-01"
    train_end: "2017-12-31"
    validation_start: "2018-01-01"
    validation_end: "2020-12-31"
    test_start: "2021-01-01"
    test_end: "2099-12-31"
  - mode: expanding
    train_periods: 260
    validation_periods: 52
    test_periods: 52
    step_periods: 52
  - mode: rolling
    train_periods: 260
    validation_periods: 52
    test_periods: 52
    step_periods: 52

report:
  output_dir: reports/real_us_multi_asset_v1/data_quality
