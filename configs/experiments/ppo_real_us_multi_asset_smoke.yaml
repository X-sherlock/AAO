portfolio_config: configs/real_us_multi_asset_portfolio.yaml

dataset:
  type: frozen_real
  dataset_id: real_us_multi_asset_v1
  data_path: data/processed/real_us_multi_asset_v1

split:
  mode: fixed
  split_id: fixed_v1

risk:
  estimator: shrinkage

evaluation:
  periods_per_year: 52

training:
  device: cpu
  seed: 42
  output_dir: reports/real_us_multi_asset_v1/fixed_v1/ppo_smoke
  ppo:
    total_steps: 128
    rollout_steps: 64
    update_epochs: 2
    minibatch_size: 32
    learning_rate: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.2
    entropy_coefficient: 0.001
    value_coefficient: 0.5
    max_gradient_norm: 0.5
    hidden_dim: 32
